<script>
// ============ GAME DATA ============
const CATEGORIES = [
  "Objects & Methods",
  "Selection & Iteration",
  "Class Creation",
  "Arrays & ArrayLists",
  "Recursion",
  "Miscellaneous",
];

const VALUES = [100, 200, 300, 400, 500, 600];

// All questions are free-response. Teams give an answer before clicking "Reveal Answer".
// Every output answer below was VERIFIED by compiling and running the Java code.
const BOARD = {
  "Objects & Methods": [
    {
      question: "In Java, when an object is passed as an argument to a method, what exactly is copied into the parameter, and why does this allow the method to mutate the object's fields but NOT change which object the caller's variable refers to?",
      code: null,
      answer: "The reference (the address) is copied. Java is pass-by-value of the reference.",
      explanation: "Java is strictly pass-by-value. For objects, the value that gets copied is the reference itself, so the parameter and the caller's variable end up pointing to the same object. Mutating fields through the parameter is visible to the caller (same object). But reassigning the parameter only changes the local copy of the reference, so the caller's variable is untouched.",
    },
    {
      question: "What is printed?",
      code: `public class Cat {
  private String name;
  public Cat(String n) { name = n; }
  public void rename(String name) { name = "Whiskers"; }
  public String getName() { return name; }
}

Cat c = new Cat("Felix");
c.rename("Tom");
System.out.println(c.getName());`,
      answer: "Felix",
      explanation: "Inside rename, the parameter `name` shadows the field. The line `name = \"Whiskers\"` reassigns the LOCAL parameter; it never touches the field. The field stays \"Felix\".",
    },
    {
      question: "What is printed?",
      code: `public class Score {
  private int points;
  public Score() { points = 10; }
  public void addPoints(int points) {
    this.points = this.points + points;
    points = 0;
  }
  public int getPoints() { return points; }
}

Score s = new Score();
s.addPoints(7);
System.out.println(s.getPoints());`,
      answer: "17",
      explanation: "First line uses `this.points`, which actually updates the field: 10 + 7 = 17. Second line `points = 0` only resets the LOCAL parameter, not the field. The field stays at 17.",
    },
    {
      question: "What is printed?",
      code: `public class Item {
  private int price;
  public Item(int p) { price = p; }
  public void swap(Item other) {
    int temp = this.price;
    this.price = other.price;
    other = new Item(temp);
  }
  public int getPrice() { return price; }
}

Item x = new Item(8);
Item y = new Item(15);
x.swap(y);
System.out.println(x.getPrice() + " " + y.getPrice());`,
      answer: "15 15",
      explanation: "temp = 8. Then this.price = other.price actually mutates x's field to 15. But `other = new Item(temp)` only reassigns the LOCAL parameter, so y is unchanged. So x.price became 15 and y.price is still 15. Output: 15 15.",
    },
    {
      question: "What is printed?",
      code: `public class Node {
  public int val;
  public Node(int v) { val = v; }
  public void modify(Node other) {
    other.val = this.val + other.val;
    this.val = other.val - this.val;
    other.val = other.val - this.val;
  }
}

Node p = new Node(5);
Node q = new Node(2);
p.modify(q);
System.out.println(p.val + " " + q.val);`,
      answer: "2 5",
      explanation: "This is the classic arithmetic swap. Step 1: q.val = 5+2 = 7. Step 2: p.val = 7-5 = 2. Step 3: q.val = 7-2 = 5. p and q have been swapped. Output: 2 5.",
    },
    {
      question: "What is printed?",
      code: `public class Cell {
  private int n;
  public Cell(int n) { this.n = n; }
  public void update(Cell c) {
    c.n += this.n;
    this.n -= 1;
  }
  public int getN() { return n; }
}

Cell a = new Cell(4);
Cell b = new Cell(7);
a.update(b);
a.update(a);
b.update(a);
System.out.println(a.getN() + " " + b.getN());`,
      answer: "16 10",
      explanation: "Start: a=4, b=7.\na.update(b): b.n = 7+4 = 11; a.n = 4-1 = 3.\na.update(a): this and c are the same object! c.n += this.n → a.n = 3+3 = 6. Then this.n -= 1 → a.n = 5.\nb.update(a): a.n = 5+11 = 16; b.n = 11-1 = 10.\nFinal: a=16, b=10.",
    },
  ],
  "Selection & Iteration": [
    {
      question: "What is the output?",
      code: `int x = 2;
int y = 0;
for (int i = 1; i <= 4; i++) {
  if (i % 2 == 0) {
    y += x * i;
  } else {
    y += x + i;
  }
  x++;
}
System.out.println(y);`,
      answer: "36",
      explanation: "i=1 (odd): y += 2+1 = 3 → y=3, x=3.\ni=2 (even): y += 3*2 = 6 → y=9, x=4.\ni=3 (odd): y += 4+3 = 7 → y=16, x=5.\ni=4 (even): y += 5*4 = 20 → y=36, x=6.\nOutput: 36.",
    },
    {
      question: "What is the output?",
      code: `int n = 5;
int product = 1;
int i = 1;
while (i <= n) {
  if (i % 2 == 1) {
    product *= i;
  } else {
    product += i;
  }
  i++;
}
System.out.println(product);`,
      answer: "65",
      explanation: "i=1 (odd): product *= 1 → 1.\ni=2 (even): product += 2 → 3.\ni=3 (odd): product *= 3 → 9.\ni=4 (even): product += 4 → 13.\ni=5 (odd): product *= 5 → 65.\nOutput: 65.",
    },
    {
      question: "What is the output?",
      code: `int total = 0;
for (int i = 1; i <= 4; i++) {
  for (int j = i; j > 0; j--) {
    if ((i + j) % 2 == 0) {
      total += i;
    } else {
      total -= j;
    }
  }
}
System.out.println(total);`,
      answer: "10",
      explanation: "i=1: j=1 → total += 1 = 1.\ni=2: j=2 → +2=3; j=1 → -1=2.\ni=3: j=3 → +3=5; j=2 → -2=3; j=1 → +3=6.\ni=4: j=4 → +4=10; j=3 → -3=7; j=2 → +4=11; j=1 → -1=10.\nOutput: 10.",
    },
    {
      question: "What is the output?",
      code: `int a = 10;
int b = 0;
while (a > 0) {
  if (a % 3 == 0) {
    b += a;
    a -= 4;
  } else if (a % 2 == 0) {
    b -= 1;
    a -= 3;
  } else {
    b *= 2;
    a -= 1;
  }
  b++;
}
System.out.println(b);`,
      answer: "8",
      explanation: "a=10 (even, not div3): b=-1, a=7. b++ → 0.\na=7 (odd): b*=2 → 0, a=6. b++ → 1.\na=6 (div3): b+=6 → 7, a=2. b++ → 8.\na=2 (even): b-=1 → 7, a=-1. b++ → 8.\na=-1 exits. Output: 8.",
    },
    {
      question: "What is the output? (Watch operator precedence carefully: && binds tighter than ||.)",
      code: `int x = 5;
int y = 2;
int count = 0;
for (int i = 0; i < 4; i++) {
  boolean cond = (i < 2);
  if (cond && x > y || !cond && y < x) {
    count += x;
    x--;
  } else {
    count += y;
    y++;
  }
  if ((x + y) % 3 == 0) {
    count *= 2;
  } else {
    count -= i;
  }
}
System.out.println(count);`,
      answer: "13",
      explanation: "Condition parses as (cond && x>y) || (!cond && y<x).\ni=0: cond=true, 5>2 → if branch. count+=5=5, x=4. (x+y)=6, %3=0 → count*=2=10.\ni=1: cond=true, 4>2 → if. count+=4=14, x=3. (x+y)=5 → count-=1=13.\ni=2: cond=false, y<x (2<3) → if. count+=3=16, x=2. (x+y)=4 → count-=2=14.\ni=3: cond=false, y<x (2<2) → false. else. count+=2=16, y=3. (x+y)=5 → count-=3=13.\nOutput: 13.",
    },
    {
      question: "What is the output?",
      code: `int p = 1;
int q = 4;
int r = 0;
for (int i = 0; i < 3; i++) {
  if (q % 2 == 0) {
    p += q;
    for (int j = 1; j <= 2; j++) {
      if ((p * j) % 4 == 0) {
        r += p;
      } else {
        r += q - j;
      }
    }
    q--;
  } else {
    r += p + q;
    p++;
  }
  if (r % 3 == 0) {
    q += i;
  } else {
    p += r % 4;
  }
}
System.out.println(p + " " + q + " " + r);`,
      answer: "12 3 26",
      explanation: "i=0: q=4 even. p=5. j=1: 5%4≠0 → r+=3=3. j=2: 10%4≠0 → r+=2=5. q=3. r%3=2 → p+=5%4=1, p=6.\ni=1: q=3 odd. r+=6+3=14. p=7. r%3=2 → p+=14%4=2, p=9.\ni=2: q=3 odd. r+=9+3=26. p=10. r%3=2 → p+=26%4=2, p=12.\nFinal: 12 3 26.",
    },
  ],
  "Class Creation": [
    {
      question: "When you write a class without an explicit constructor, Java provides one automatically. What does this default constructor do, and what happens to your instance variables?",
      code: null,
      answer: "Java provides a no-arg constructor with an empty body. Instance variables get default values.",
      explanation: "If you don't write any constructor, Java inserts a no-argument default constructor that does nothing in its body. Instance variables are initialized to their default values: 0 for numeric primitives (int, double, etc.), false for boolean, '\\u0000' for char, and null for any object reference. (Note: as soon as you write your own constructor, the default disappears.)",
    },
    {
      question: "What is printed?",
      code: `public class Account {
  private double balance = 50.0;
  public void deposit(double amount) { balance += amount; }
  public double getBalance() { return balance; }
}

Account x = new Account();
Account y = new Account();
x.deposit(20);
y.deposit(10);
System.out.println(x.getBalance() + " " + y.getBalance());`,
      answer: "70.0 60.0",
      explanation: "x and y are SEPARATE objects, each with its own copy of the `balance` field initialized to 50.0. x.deposit(20) only affects x → 70.0. y.deposit(10) only affects y → 60.0. Each object has independent instance state.",
    },
    {
      question: "This constructor is supposed to make a defensive copy of the array so the outside caller can't modify the object's internal data. What's wrong with it, and how would you fix it?",
      code: `public class Hand {

  public Hand(int[] cards) {

  }

      answer: "It stores the same reference, not a copy. Fix: this.cards = cards.clone();",
      explanation: "`this.cards = cards` copies only the reference, so the field and the caller's array point to the SAME array. If the caller mutates their array later, the Hand's internal state changes too, which defeats the point of a defensive copy. Fix it with `this.cards = cards.clone();` or `this.cards = Arrays.copyOf(cards, cards.length);` so the Hand has its own independent array.",

Tracker t1 = new Tracker();
Tracker t2 = new Tracker();
Tracker t3 = new Tracker();
System.out.println(t1.getId() + " " + t2.getId() + " " + t3.getId() + " " + Tracker.getTotal());`,
      answer: "1 2 3 3",
      explanation: "`total` is STATIC, shared across all instances. Each constructor call increments total, then captures it as the instance's id. t1: total=1, id=1. t2: total=2, id=2. t3: total=3, id=3. The shared total ends at 3. Output: 1 2 3 3.",
    },
    {
      question: "Why does this code not behave like the programmer expects, and what is actually printed?",
      code: `public class Temperature {
  private double celsius;
  public Temperature(double c) { celsius = c; }

      explanation: "The `add` method mutates `this` (`celsius += other.celsius`) instead of building a new Temperature. So t1.celsius becomes 25.0. Then `return this` means t3 is just another reference to the SAME object as t1. The fix would be `return new Temperature(this.celsius + other.celsius);` and not mutating `this`.",
    },
    {

      code: `public class Vec {

Vec v = new Vec(1, 2);

      answer: "(8,16)",

int[][] g = {{1, 4, 7},

      code: `public static int a(int n) {
  if (n <= 0) return 0;
  return n + b(n - 1);

    {
      question: "What is printed?",
      code: `String a = "test";
String b = a;
a = a.toUpperCase();
System.out.println(a + " " + b);`,

      explanation: "Strings are IMMUTABLE: String methods never modify the original; they always return a NEW String. After `String b = a`, both variables reference the same \"test\" object. Then `a.toUpperCase()` builds a brand-new String \"TEST\" and reassigns `a` to it. b still points to the original \"test\". Output: TEST test.",

      question: "What is printed?",
      code: `int a = 7;
int b = 2;
double c = a / b;

      explanation: "When BOTH operands of / are int, Java does integer division (truncates toward zero). 7 / 2 = 3, then that 3 is widened to 3.0 when stored in a double, so c = 3.0.\nIn `(double) a / b`, the cast turns a into 7.0 first. The cast binds tighter than /, so this is 7.0 / 2, and as soon as one operand is a double, b is auto-promoted, giving 3.5.",
    },

      question: "What is printed?",
      code: `String a = "Hi";
String b = "Hi";

      explanation: "Math.pow always returns a double; even integer powers give 8.0, not 8.\nMath.sqrt(20) ≈ 4.472..., and casting to int TRUNCATES toward zero (not rounds), giving 4.\nMath.abs(-7.5) returns 7.5.\nOutput: \"8.0 4 7.5\".",

const DEFAULT_TEAMS = [
  { name: "Team 1", color: "#ef4444" },
  { name: "Team 2", color: "#22c55e" },
  { name: "Team 3", color: "#3b82f6" },
];

// ============ STATE ============
let teams = DEFAULT_TEAMS.map(t => ({...t}));
let scores = [0, 0, 0];
let answered = {}; // "category-valueIdx" -> true
let active = null; // { category, valueIdx, cell }
let revealed = false;
let editingTeams = false;

const totalCells = CATEGORIES.length * VALUES.length;

// ============ HELPERS ============
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function answeredCount() { return Object.keys(answered).length; }

// ============ RENDER BOARD ============
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'category-cell';
    el.textContent = cat;
    board.appendChild(el);
  });

  VALUES.forEach((val, valueIdx) => {
    CATEGORIES.forEach(cat => {
      const key = `${cat}-${valueIdx}`;
      const isAnswered = !!answered[key];
      const el = document.createElement('div');
      el.className = 'value-cell' + (isAnswered ? ' answered' : '');
      el.textContent = isAnswered ? '' : `$${val}`;
      if (!isAnswered) {
        el.addEventListener('click', () => openCell(cat, valueIdx));
      }
      board.appendChild(el);
    });
  });

  document.getElementById('answered-count').textContent = answeredCount();
  document.getElementById('total-count').textContent = totalCells;
}

// ============ RENDER TEAM BAR ============
function renderTeamBar() {
  const bar = document.getElementById('team-bar');
  bar.innerHTML = '';

  const maxScore = Math.max(...scores);
  const allEqual = scores[0] === scores[1] && scores[1] === scores[2];

  teams.forEach((team, idx) => {
    const isLeader = scores[idx] === maxScore && !allEqual;
    const card = document.createElement('div');
    card.className = 'team-card' + (isLeader ? ' leader' : '');
    card.style.borderLeft = `2px solid ${team.color}`;

    let nameHtml;
    if (editingTeams) {
      nameHtml = `<input class="team-name-input" value="${escapeHtml(team.name)}" maxlength="20" style="border: 1px solid ${team.color}66;" oninput="updateTeamName(${idx}, this.value)" />`;
    } else {
      nameHtml = `<div class="team-name" style="color: ${team.color};">
        ${escapeHtml(team.name)}
        ${isLeader ? '<span class="leader-star">★</span>' : ''}
      </div>`;
    }

    const sign = scores[idx] < 0 ? '-' : '';
    const absScore = Math.abs(scores[idx]);

    card.innerHTML = `
      ${nameHtml}
      <div class="team-row">
        <div class="team-score">${sign}$${absScore}</div>
        <div class="team-adjust">
          <button style="border: 1px solid ${team.color}44;" onclick="updateScore(${idx}, -100)" title="−$100">−</button>
          <button style="border: 1px solid ${team.color}44;" onclick="updateScore(${idx}, 100)" title="+$100">+</button>
        </div>
      </div>
    `;
    bar.appendChild(card);
  });
}

// ============ MODAL ============
function openCell(category, valueIdx) {
  const key = `${category}-${valueIdx}`;
  if (answered[key]) return;
  active = { category, valueIdx, cell: BOARD[category][valueIdx] };
  revealed = false;
  renderModal();
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeCell() {
  active = null;
  revealed = false;
  document.getElementById('modal-backdrop').classList.remove('open');
  checkGameComplete();
}

function renderModal() {
  if (!active) return;
  const modal = document.getElementById('modal');
  const { category, valueIdx, cell } = active;
  const value = VALUES[valueIdx];

  let revealHtml = '';
  if (revealed) {
    revealHtml = `<div class="reveal-box">
      <div class="reveal-label">ANSWER</div>
      <div class="reveal-answer">${escapeHtml(cell.answer)}</div>
    </div>`;
  }

  let explanationHtml = '';
  if (revealed) {
    explanationHtml = `<div class="explanation">${escapeHtml(cell.explanation)}</div>`;
  }

  let actionsHtml = '';
  if (!revealed) {
    actionsHtml = `
      <button class="btn btn-ghost" onclick="skipQuestion()">Skip (no points)</button>
      <button class="btn btn-primary" onclick="revealAnswer()">Reveal Answer</button>
    `;
  } else {
    actionsHtml = `
      <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
        <div style="font-size: 11px; letter-spacing: 0.2em; color: #9bb3ff; text-align: center; text-transform: uppercase;">Who gets the points?</div>
        <div class="scoring-grid">
          ${teams.map((t, i) => `
            <button class="score-award-btn" style="background: ${t.color};" onclick="markCorrect(${i})">
              ${escapeHtml(t.name)}
              <div style="font-size: 14px; margin-top: 2px;">+$${value}</div>
            </button>
          `).join('')}
        </div>
        <div class="scoring-grid">
          ${teams.map((t, i) => `
            <button class="score-wrong-btn" style="border: 1px solid ${t.color};" onclick="markIncorrect(${i})">
              ${escapeHtml(t.name)} wrong
              <div>−$${value}</div>
            </button>
          `).join('')}
        </div>
        <button class="btn btn-ghost" style="align-self: center; margin-top: 4px;" onclick="closeCell()">Close (no score change)</button>
      </div>
    `;
  }

  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-category">${escapeHtml(category)}</div>
      <div class="modal-value">$${value}</div>
    </div>
    <div class="question-text">${escapeHtml(cell.question)}</div>
    ${cell.code ? `<pre class="code-block">${escapeHtml(cell.code)}</pre>` : ''}
    ${revealHtml}
    ${explanationHtml}
    <div class="actions">${actionsHtml}</div>
  `;
}

// ============ ACTIONS ============
function revealAnswer() {
  revealed = true;
  renderModal();
}

function markCorrect(teamIdx) {
  const { category, valueIdx } = active;
  const key = `${category}-${valueIdx}`;
  scores[teamIdx] += VALUES[valueIdx];
  answered[key] = true;
  renderBoard();
  renderTeamBar();
  closeCell();
}

function markIncorrect(teamIdx) {
  const { category, valueIdx } = active;
  const key = `${category}-${valueIdx}`;
  scores[teamIdx] -= VALUES[valueIdx];
  answered[key] = true;
  renderBoard();
  renderTeamBar();
  closeCell();
}

function skipQuestion() {
  const { category, valueIdx } = active;
  const key = `${category}-${valueIdx}`;
  answered[key] = true;
  renderBoard();
  closeCell();
}

function updateScore(idx, delta) {
  scores[idx] += delta;
  renderTeamBar();
}

function updateTeamName(idx, name) {
  teams[idx].name = name;
}

function resetGame() {
  const anyProgress = answeredCount() > 0 || scores.some(s => s !== 0);
  if (anyProgress && !confirm("Reset the entire game?")) return;
  scores = [0, 0, 0];
  answered = {};
  active = null;
  document.getElementById('modal-backdrop').classList.remove('open');
  document.getElementById('winner-banner').classList.remove('open');
  renderBoard();
  renderTeamBar();
}

function toggleEditTeams() {
  editingTeams = !editingTeams;
  document.getElementById('rename-btn').textContent = editingTeams ? 'Done' : 'Rename Teams';
  renderTeamBar();
}

function checkGameComplete() {
  if (answeredCount() === totalCells) {
    showWinner();
  }
}

function showWinner() {
  const banner = document.getElementById('winner-banner');
  const maxScore = Math.max(...scores);
  const winners = teams.filter((_, i) => scores[i] === maxScore);

  const winnerText = winners.length === 1
    ? `Winner: <span style="color: ${winners[0].color}; font-weight: 900; letter-spacing: 0.1em;">${escapeHtml(winners[0].name)}</span>`
    : `Tie between: ${winners.map(w => `<span style="color: ${w.color}; font-weight: 900; letter-spacing: 0.1em;">${escapeHtml(w.name)}</span>`).join(', ')}`;

  banner.innerHTML = `
    <h2 class="winner-title">GAME OVER</h2>
    <div style="font-size: 22px; color: #fff;">${winnerText}</div>
    <div class="winner-grid">
      ${teams.map((t, i) => {
        const sign = scores[i] < 0 ? '-' : '';
        return `<div class="winner-card" style="border: 2px solid ${t.color};">
          <div style="color: ${t.color}; font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700;">${escapeHtml(t.name)}</div>
          <div style="font-family: 'Bodoni MT', 'Didot', Georgia, serif; font-size: 32px; font-weight: 900; color: #FFD700; margin-top: 4px;">${sign}$${Math.abs(scores[i])}</div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn btn-primary" onclick="resetGame()">Play Again</button>
  `;
  banner.classList.add('open');
}

// ============ INIT ============
document.getElementById('reset-btn').addEventListener('click', resetGame);
document.getElementById('rename-btn').addEventListener('click', toggleEditTeams);
document.getElementById('modal-backdrop').addEventListener('click', closeCell);

renderBoard();
renderTeamBar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EECS Jeopardy — APCSA Review</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #0a1a5c 0%, #050928 60%, #020514 100%);
    font-family: Georgia, 'Times New Roman', serif;
    color: #fff;
    padding: 24px 16px 48px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 40% 80%, rgba(255,215,0,0.3), transparent),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.4), transparent);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 24px; }
  .title {
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-size: clamp(36px, 7vw, 72px);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: #FFD700;
    text-shadow: 0 4px 0 #000, 0 8px 24px rgba(255,215,0,0.4);
    margin: 0;
    line-height: 1;
  }
  .subtitle {
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.3em;
    color: #9bb3ff;
    margin-top: 8px;
    text-transform: uppercase;
  }
  .top-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .cleared-box {
    background: linear-gradient(180deg, #1a2a8a, #0a1450);
    border: 3px solid #FFD700;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 4px 12px rgba(0,0,0,0.5);
  }
  .cleared-label {
    font-size: 11px;
    color: #9bb3ff;
    letter-spacing: 0.2em;
    display: block;
    text-transform: uppercase;
  }
  .cleared-value {
    color: #FFD700;
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
  }
  .btn-ghost {
    background: transparent;
    color: #9bb3ff;
    border: 1px solid #3a4a8a;
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    background: #000;
    padding: 6px;
    border-radius: 8px;
    box-shadow: 0 0 0 3px #FFD700, 0 20px 60px rgba(0,0,0,0.6);
  }
  .category-cell {
    background: linear-gradient(180deg, #1e3adf 0%, #0a1a8a 100%);
    padding: 18px 8px;
    text-align: center;
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-weight: 900;
    font-size: clamp(11px, 1.2vw, 15px);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #FFD700;
    text-shadow: 0 2px 0 #000;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #000;
    line-height: 1.1;
  }
  .value-cell {
    background: linear-gradient(180deg, #1e3adf 0%, #0a1a8a 100%);
    padding: 24px 8px;
    text-align: center;
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-weight: 900;
    font-size: clamp(18px, 2.2vw, 32px);
    color: #FFD700;
    text-shadow: 0 3px 0 #000, 0 0 12px rgba(255,215,0,0.3);
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #000;
    cursor: pointer;
    transition: filter 0.15s;
    user-select: none;
  }
  .value-cell:hover { filter: brightness(1.2); }
  .value-cell.answered {
    background: linear-gradient(180deg, #050928, #020514);
    color: transparent;
    text-shadow: none;
    cursor: default;
  }
  .value-cell.answered:hover { filter: none; }
  .hint {
    text-align: center;
    margin-top: 24px;
    color: #9bb3ff;
    font-size: 13px;
    letter-spacing: 0.15em;
    font-style: italic;
  }
  .team-bar {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid rgba(155,179,255,0.15);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }
  .team-card {
    padding-left: 12px;
    opacity: 0.75;
    transition: opacity 0.3s;
  }
  .team-card.leader { opacity: 1; }
  .team-name {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .team-name-input {
    background: rgba(0,0,0,0.3);
    color: #fff;
    padding: 2px 6px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 11px;
    width: 100%;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;

  .team-row {
    display: flex;
    align-items: baseline;

  .team-score {
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-size: 20px;
    font-weight: 700;
    color: #d8e0ff;
  }
  .team-adjust {
    display: flex;
    gap: 3px;
  }
  .team-adjust button {
    background: transparent;
    color: #9bb3ff;
    padding: 2px 6px;
    border-radius: 2px;
    cursor: pointer;
    font-family: inherit;
    font-size: 10px;
    line-height: 1;
  }

  /* modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
    backdrop-filter: blur(4px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: linear-gradient(180deg, #1e3adf 0%, #0a1a8a 100%);
    border: 4px solid #FFD700;
    border-radius: 8px;
    padding: 32px;
    max-width: 800px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 80px rgba(0,0,0,0.8), inset 0 2px 0 rgba(255,255,255,0.15);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,215,0,0.3);
  }
  .modal-category {
    font-size: 13px;
    letter-spacing: 0.25em;
    color: #9bb3ff;
    text-transform: uppercase;
  }
  .modal-value {
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-size: 32px;
    font-weight: 900;
    color: #FFD700;
    text-shadow: 0 2px 0 #000;
  }
  .question-text {
    font-size: 20px;
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .code-block {
    background: #020514;
    border: 1px solid #3a4a8a;
    border-radius: 4px;
    padding: 16px;
    font-family: 'JetBrains Mono', 'Fira Code', Menlo, monospace;
    font-size: 13px;
    line-height: 1.5;
    color: #b8c8ff;
    white-space: pre;
    overflow-x: auto;
    margin-bottom: 20px;
  }
  .team-select-box {
    margin-bottom: 16px;
    padding: 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 4px;
  }
  .team-select-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #9bb3ff;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .team-select-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .team-select-btn {
    background: rgba(0,0,0,0.3);
    color: #fff;
    padding: 10px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .team-select-btn.selected { color: #000; }
  .choices-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .choice-btn {
    background: rgba(0,0,0,0.3);
    border: 2px solid #3a4a8a;
    color: #fff;
    padding: 14px 18px;
    border-radius: 4px;
    font-size: 16px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .choice-btn.selected { background: rgba(255,215,0,0.15); border-color: #FFD700; }
  .choice-btn.correct { background: rgba(34,197,94,0.2); border-color: #22c55e; cursor: default; }
  .choice-btn.incorrect { background: rgba(239,68,68,0.2); border-color: #ef4444; cursor: default; }
  .reveal-box {
    background: rgba(0,0,0,0.4);
    border: 2px dashed #FFD700;
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
  }
  .reveal-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #9bb3ff;
    margin-bottom: 8px;
  }
  .reveal-answer {
    font-size: 22px;
    color: #FFD700;
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-weight: 700;
    white-space: pre-wrap;
  }
  .explanation {
    background: rgba(0,0,0,0.3);
    border-left: 3px solid #FFD700;
    padding: 16px;
    margin-bottom: 20px;
    font-size: 15px;
    line-height: 1.6;
    color: #d8e0ff;
    white-space: pre-wrap;
  }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary { background: #FFD700; color: #000; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-success { background: #22c55e; color: #000; }
  .btn-danger { background: #ef4444; color: #fff; }
  .scoring-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
  }
  .score-award-btn {
    color: #000;
    border: none;
    padding: 12px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .score-wrong-btn {
    background: rgba(239,68,68,0.15);
    color: #fff;
    padding: 8px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  .score-wrong-btn div {
    color: #ef4444;
    font-weight: 700;
    font-size: 12px;
  }

  .winner-banner {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    flex-direction: column;
    gap: 20px;
    padding: 24px;
    text-align: center;
  }
  .winner-banner.open { display: flex; }
  .winner-title {
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-size: clamp(40px, 8vw, 80px);
    color: #FFD700;
    text-shadow: 0 4px 0 #000, 0 8px 24px rgba(255,215,0,0.6);
    margin: 0;
    letter-spacing: 0.1em;
  }
  .winner-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 600px;
    width: 100%;
  }
  .winner-card {
    border-radius: 6px;
    padding: 16px;
    background: rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">EECS JEOPARDY</h1>
      <div class="subtitle">APCSA Review · Niral, Tanu, Shreya, Rachael, Dyuti</div>
    </header>

    <div class="top-bar">
      <div class="cleared-box">
        <span class="cleared-label">Cleared</span>
        <span class="cleared-value"><span id="answered-count">0</span>/<span id="total-count">36</span></span>
      </div>
      <button class="btn-ghost" id="rename-btn">Rename Teams</button>
      <button class="btn-ghost" id="reset-btn">Reset Game</button>
    </div>

    <div class="board" id="board"></div>

    <div class="hint">Click a dollar value to reveal the clue</div>

    <div class="team-bar" id="team-bar"></div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
  </div>

  <div class="winner-banner" id="winner-banner"></div>

<script>
// ============ GAME DATA ============
const CATEGORIES = [
  "Objects & Methods",
  "Selection & Iteration",
  "Class Creation",
  "Arrays & ArrayLists",
  "Recursion",
  "Miscellaneous",
];

const VALUES = [100, 200, 300, 400, 500, 600];

const BOARD = {
  "Objects & Methods": [
    {
      question: "Which statement BEST describes how objects are passed into methods in Java?",
      code: null,
      choices: [
        "A. Objects are passed by reference",
        "B. Objects are passed by value of their reference",
        "C. Objects are passed by value of their data",
        "D. Objects are passed by copy of the object",
      ],
      answer: "B",
      explanation: "Java is strictly pass-by-value. For objects, the VALUE that gets copied is the reference itself — so the method receives a copy of the reference pointing to the same object.",
    },
    {
      question: "What is printed?",
      code: `public class Dog {
  private String name;
  public Dog(String n) { name = n; }
  public void setName(String n) { n = name; }
  public String getName() { return name; }
}

Dog d = new Dog("Max");
d.setName("Buddy");
System.out.println(d.getName());`,
      choices: ["A. Max", "B. Buddy", "C. null", "D. Compilation error"],
      answer: "A",
      explanation: "Inside setName, the line `n = name;` assigns the field's value to the local parameter. The field `name` is never modified, so it stays \"Max\".",
    },
    {
      question: "What is printed?",
      code: `public class Counter {
  private int count;
  public Counter() { count = 0; }
  public void increment(int count) { count++; }
  public int getCount() { return count; }
}

Counter c = new Counter();
c.increment(5);
System.out.println(c.getCount());`,
      choices: ["A. 0", "B. 1", "C. 5", "D. 6"],
      answer: "A",
      explanation: "The parameter `count` shadows the instance field. `count++` increments the local parameter, not the field. The field stays at 0.",
    },
    {
      question: "What is printed?",
      code: `public class Box {
  private int value;
  public Box(int v) { value = v; }
  public void change(Box b) {
    b.value = 20;
    b = new Box(50);
  }
  public int getValue() { return value; }
}

Box b1 = new Box(10);
b1.change(b1);
System.out.println(b1.getValue());`,
      choices: ["A. 10", "B. 20", "C. 50", "D. Compilation error"],
      answer: "B",
      explanation: "`b.value = 20` mutates the actual object b1 points to. Then `b = new Box(50)` only reassigns the LOCAL copy of the reference — b1 is unaffected. Result: 20.",
    },
    {
      question: "What is printed?",
      code: `public class A {
  public int num;
  public A(int n) { num = n; }
  public void mystery(A other) {
    other.num = num + other.num;
    num = num * 2;
  }
}

A obj1 = new A(3);
A obj2 = new A(4);
obj1.mystery(obj2);
System.out.println(obj1.num + " " + obj2.num);`,
      choices: ["A. 3 7", "B. 6 7", "C. 6 10", "D. 3 10"],
      answer: "B",
      explanation: "other.num = 3 + 4 = 7 (obj2.num becomes 7). Then num = 3 * 2 = 6 (obj1.num becomes 6). Output: \"6 7\".",
    },
    {
      question: "What is printed?",
      code: `public class Wrapper {
  private int value;
  public Wrapper(int v) { value = v; }
  public void update(Wrapper w) {
    w.value += value;
    value += 5;
  }
  public int getValue() { return value; }
}

Wrapper a = new Wrapper(2);
Wrapper b = new Wrapper(3);
a.update(b);
b.update(a);
System.out.println(a.getValue() + " " + b.getValue());`,
      choices: ["A. 7 5", "B. 10 7", "C. 12 10", "D. 7 10"],
      answer: "C",
      explanation: "a.update(b): b.value = 3+2 = 5, a.value = 2+5 = 7. Now a=7, b=5. b.update(a): a.value = 7+5 = 12, b.value = 5+5 = 10. Output: \"12 10\".",
    },
  ],
  "Selection & Iteration": [
    {
      question: "What is the output of this code?",
      code: `int x = 3;
int y = 5;
int sum = 0;
for (int i = 0; i < 4; i++) {
  x += i;
  for (int j = 2; j >= 0; j--) {
    if ((x + j) % 2 == 0) {
      sum += x - j;
    } else if ((y + i) % 3 == 0) {
      sum += y + j;
      y--;
    } else {
      sum += i + j;
    }
    x--;
  }
  y += i;
}
System.out.println(sum);`,
      choices: null,
      answer: "1",
      explanation: "Trace carefully — this one requires tracking x, y, and sum through all iterations. Final sum = 1.",
    },
    {
      question: "What is the output of the code?",
      code: `int a = 7;
int b = 2;
int count = 0;
while (a > 0) {
  if (a % 2 == 1) {
    for (int i = 0; i < b; i++) {
      count += i;
      if (count % 2 == 0) {
        a -= 2;
      } else {
        a--;
      }
    }
  } else {
    a /= 2;
    b++;
  }
  count++;
}
System.out.println(count);`,
      choices: null,
      answer: "11",
      explanation: "Final count = 11 after tracing through all the branches.",
    },
    {
      question: "What is the output of the code?",
      code: `int n = 6;
int total = 1;
for (int i = 1; i <= n; i++) {
  int temp = i;
  while (temp > 0) {
    if (temp % 2 == 0) {
      total += temp / 2;
      temp -= 3;
    } else {
      total += temp;
      temp -= 2;
    }
  }
  if (total % 5 == 0) {
    total /= 5;
  } else {
    total += i;
  }
}
System.out.println(total);`,
      choices: null,
      answer: "15",
      explanation: "Final total = 15.",
    },
    {
      question: "What is the output of the code?",
      code: `int result = 0;
for (int i = 1; i <= 3; i++) {
  int val = i * 2;
  for (int j = 0; j < 3; j++) {
    int temp = val;
    if (j % 2 == 0) {
      temp += j;
    } else {
      temp -= i;
    }
    for (int k = 1; k <= 2; k++) {
      if ((temp + k) % 3 == 0) {
        result += temp * k;
      } else {
        result -= k;
      }
    }
  }
}
System.out.println(result);`,
      choices: null,
      answer: "12",
      explanation: "Triple nested loop trace — final result = 12.",
    },
    {
      question: "What is the output of the code?",
      code: `int x = 4;
int y = 3;
int z = 0;
for (int i = 0; i < 5; i++) {
  boolean flag = (i % 2 == 0);
  if (flag && x > y || !flag && y > x) {
    z += x - y;
    x--;
  } else {
    z += y - x;
    y++;
  }
  if ((x + y + z) % 4 == 0) {
    z /= 2;
  } else {
    z += i;
  }
}
System.out.println(z);`,
      choices: null,
      answer: "7",
      explanation: "Remember && binds tighter than ||. Final z = 7.",
    },
    {
      question: "What is the output of the code?",
      code: `int a = 2;
int b = 3;
int c = 1;
for (int i = 0; i < 4; i++) {
  if (a % 2 == 0) {
    b += a;
    for (int j = 0; j < 2; j++) {
      if ((b + j) % 3 == 0) {
        c += b - j;
      } else {
        c += a + j;
      }
    }
    a++;
  } else {
    c += b;
    b--;
  }
  if (c % 2 == 0) {
    a += c % 3;
  } else {
    b += c % 2;
  }
}
System.out.println(a + " " + b + " " + c);`,
      choices: null,
      answer: "3 6 25",
      explanation: "After all 4 iterations: a=3, b=6, c=25.",
    },
  ],
  "Class Creation": [
    {
      question: "What is the purpose of the `this` keyword when used inside a constructor, and when is it necessary?",
      code: null,
      choices: null,
      answer: "To refer to the current object",
      explanation: "`this` refers to the current object. It's necessary when a parameter has the same name as an instance variable. Without it, the assignment would just reassign the parameter to itself.",
    },
    {

const DEFAULT_TEAMS = [
  { name: "Team 1", color: "#ef4444" },
  { name: "Team 2", color: "#22c55e" },
  { name: "Team 3", color: "#3b82f6" },
];

// ============ STATE ============
let teams = DEFAULT_TEAMS.map(t => ({...t}));
let scores = [0, 0, 0];
let answered = {}; // "category-valueIdx" -> true
let active = null; // { category, valueIdx, cell }
let selectedChoice = null;
let revealed = false;
let activeTeam = null;
let editingTeams = false;

const totalCells = CATEGORIES.length * VALUES.length;

// ============ HELPERS ============
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function answeredCount() { return Object.keys(answered).length; }

// ============ RENDER BOARD ============
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'category-cell';
    el.textContent = cat;
    board.appendChild(el);
  });

  VALUES.forEach((val, valueIdx) => {
    CATEGORIES.forEach(cat => {
      const key = `${cat}-${valueIdx}`;
      const isAnswered = !!answered[key];
      const el = document.createElement('div');
      el.className = 'value-cell' + (isAnswered ? ' answered' : '');
      el.textContent = isAnswered ? '' : `$${val}`;
      if (!isAnswered) {
        el.addEventListener('click', () => openCell(cat, valueIdx));
      }
      board.appendChild(el);
    });
  });

  document.getElementById('answered-count').textContent = answeredCount();
  document.getElementById('total-count').textContent = totalCells;
}

// ============ RENDER TEAM BAR ============
function renderTeamBar() {
  const bar = document.getElementById('team-bar');
  bar.innerHTML = '';

  const maxScore = Math.max(...scores);
  const allEqual = scores[0] === scores[1] && scores[1] === scores[2];

  teams.forEach((team, idx) => {
    const isLeader = scores[idx] === maxScore && !allEqual;
    const card = document.createElement('div');
    card.className = 'team-card' + (isLeader ? ' leader' : '');
    card.style.borderLeft = `2px solid ${team.color}`;

    let nameHtml;
    if (editingTeams) {
      nameHtml = `<input class="team-name-input" value="${escapeHtml(team.name)}" maxlength="20" style="border: 1px solid ${team.color}66;" oninput="updateTeamName(${idx}, this.value)" />`;
    } else {
      nameHtml = `<div class="team-name" style="color: ${team.color};">
        ${escapeHtml(team.name)}
        ${isLeader ? '<span class="leader-star">★</span>' : ''}
      </div>`;
    }

    const sign = scores[idx] < 0 ? '-' : '';
    const absScore = Math.abs(scores[idx]);

    card.innerHTML = `
      ${nameHtml}
      <div class="team-row">
        <div class="team-score">${sign}$${absScore}</div>
        <div class="team-adjust">
          <button style="border: 1px solid ${team.color}44;" onclick="updateScore(${idx}, -100)" title="−$100">−</button>
          <button style="border: 1px solid ${team.color}44;" onclick="updateScore(${idx}, 100)" title="+$100">+</button>
        </div>
      </div>
    `;
    bar.appendChild(card);
  });
}

// ============ MODAL ============
function openCell(category, valueIdx) {
  const key = `${category}-${valueIdx}`;
  if (answered[key]) return;
  active = { category, valueIdx, cell: BOARD[category][valueIdx] };
  selectedChoice = null;
  revealed = false;
  activeTeam = null;
  renderModal();
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeCell() {
  active = null;
  selectedChoice = null;
  revealed = false;
  activeTeam = null;
  document.getElementById('modal-backdrop').classList.remove('open');
  checkGameComplete();
}

function renderModal() {
  if (!active) return;
  const modal = document.getElementById('modal');
  const { category, valueIdx, cell } = active;
  const isMC = cell.choices !== null;
  const value = VALUES[valueIdx];

  let teamSelectHtml = '';
  if (!revealed) {
    teamSelectHtml = `
      <div class="team-select-box">
        <div class="team-select-label">${isMC ? 'Which team is answering?' : 'Who buzzed in first?'}</div>
        <div class="team-select-grid">
          ${teams.map((t, i) => `
            <button class="team-select-btn ${activeTeam === i ? 'selected' : ''}"
              style="border: 2px solid ${t.color}; ${activeTeam === i ? `background: ${t.color};` : ''}"
              onclick="selectTeam(${i})">${escapeHtml(t.name)}</button>
          `).join('')}
        </div>
      </div>
    `;
  }

  let choicesHtml = '';
  if (isMC) {
    choicesHtml = `<div class="choices-list">
      ${cell.choices.map(choice => {
        const letter = choice.trim().charAt(0);
        let state = 'default';
        if (revealed) {
          if (letter === cell.answer) state = 'correct';
          else if (letter === selectedChoice) state = 'incorrect';
        } else if (selectedChoice === letter) {
          state = 'selected';
        }
        const stateClass = state === 'default' ? '' : state;
        return `<button class="choice-btn ${stateClass}" ${revealed ? 'disabled' : ''} onclick="selectChoice('${letter}')">${escapeHtml(choice)}</button>`;
      }).join('')}
    </div>`;
  }

  let revealHtml = '';
  if (!isMC && revealed) {
    revealHtml = `<div class="reveal-box">
      <div class="reveal-label">ANSWER</div>
      <div class="reveal-answer">${escapeHtml(cell.answer)}</div>
    </div>`;
  }

  let explanationHtml = '';
  if (revealed) {
    explanationHtml = `<div class="explanation">${escapeHtml(cell.explanation)}</div>`;
  }

  let actionsHtml = '';
  if (!revealed && isMC) {
    const canSubmit = selectedChoice && activeTeam !== null;
    const label = activeTeam === null ? 'Pick a team first' : !selectedChoice ? 'Pick an answer' : `Submit for ${escapeHtml(teams[activeTeam].name)}`;
    actionsHtml = `
      <button class="btn btn-ghost" onclick="skipQuestion()">Skip (no points)</button>
      <button class="btn btn-primary" ${canSubmit ? '' : 'disabled'} onclick="submitMC()">${label}</button>
    `;
  } else if (!revealed && !isMC) {
    actionsHtml = `
      <button class="btn btn-ghost" onclick="skipQuestion()">Skip (no points)</button>
      <button class="btn btn-primary" onclick="revealAnswer()">Reveal Answer</button>
    `;
  } else if (revealed && !isMC) {
    actionsHtml = `
      <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
        <div style="font-size: 11px; letter-spacing: 0.2em; color: #9bb3ff; text-align: center; text-transform: uppercase;">Who gets the points?</div>
        <div class="scoring-grid">
          ${teams.map((t, i) => `
            <button class="score-award-btn" style="background: ${t.color};" onclick="markCorrect(${i})">
              ${escapeHtml(t.name)}
              <div style="font-size: 14px; margin-top: 2px;">+$${value}</div>
            </button>
          `).join('')}
        </div>
        <div class="scoring-grid">
          ${teams.map((t, i) => `
            <button class="score-wrong-btn" style="border: 1px solid ${t.color};" onclick="markIncorrect(${i})">
              ${escapeHtml(t.name)} wrong
              <div>−$${value}</div>
            </button>
          `).join('')}
        </div>
        <button class="btn btn-ghost" style="align-self: center; margin-top: 4px;" onclick="closeCell()">Close (no score change)</button>
      </div>
    `;
  } else if (revealed && isMC) {
    actionsHtml = `<button class="btn btn-primary" onclick="closeCell()">Continue</button>`;
  }

  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-category">${escapeHtml(category)}</div>
      <div class="modal-value">$${value}</div>
    </div>
    <div class="question-text">${escapeHtml(cell.question)}</div>
    ${cell.code ? `<pre class="code-block">${escapeHtml(cell.code)}</pre>` : ''}
    ${teamSelectHtml}
    ${choicesHtml}
    ${revealHtml}
    ${explanationHtml}
    <div class="actions">${actionsHtml}</div>
  `;
}

// ============ ACTIONS ============
function selectTeam(idx) {
  if (revealed) return;
  activeTeam = idx;
  renderModal();
}

function selectChoice(letter) {
  if (revealed) return;
  selectedChoice = letter;
  renderModal();
}

function submitMC() {
  if (!selectedChoice || activeTeam === null) return;
  const { category, valueIdx, cell } = active;
  const key = `${category}-${valueIdx}`;
  const value = VALUES[valueIdx];
  const correct = selectedChoice === cell.answer;
  scores[activeTeam] += correct ? value : -value;
  revealed = true;
  answered[key] = true;
  renderModal();
  renderBoard();
  renderTeamBar();
}

function revealAnswer() {
  revealed = true;
  renderModal();
}

function markCorrect(teamIdx) {
  const { category, valueIdx } = active;
  const key = `${category}-${valueIdx}`;
  scores[teamIdx] += VALUES[valueIdx];
  answered[key] = true;
  renderBoard();
  renderTeamBar();
  closeCell();
}

function markIncorrect(teamIdx) {
  const { category, valueIdx } = active;
  const key = `${category}-${valueIdx}`;
  scores[teamIdx] -= VALUES[valueIdx];
  answered[key] = true;
  renderBoard();
  renderTeamBar();
  closeCell();
}

function skipQuestion() {
  const { category, valueIdx } = active;
  const key = `${category}-${valueIdx}`;
  answered[key] = true;
  renderBoard();
  closeCell();
}

function updateScore(idx, delta) {
  scores[idx] += delta;
  renderTeamBar();
}

function updateTeamName(idx, name) {
  teams[idx].name = name;
}

function resetGame() {
  const anyProgress = answeredCount() > 0 || scores.some(s => s !== 0);
  if (anyProgress && !confirm("Reset the entire game?")) return;
  scores = [0, 0, 0];
  answered = {};
  active = null;
  document.getElementById('modal-backdrop').classList.remove('open');
  document.getElementById('winner-banner').classList.remove('open');
  renderBoard();
  renderTeamBar();
}

function toggleEditTeams() {
  editingTeams = !editingTeams;
  document.getElementById('rename-btn').textContent = editingTeams ? 'Done' : 'Rename Teams';
  renderTeamBar();
}

function checkGameComplete() {
  if (answeredCount() === totalCells) {
    showWinner();
  }
}

function showWinner() {
  const banner = document.getElementById('winner-banner');
  const maxScore = Math.max(...scores);
  const winners = teams.filter((_, i) => scores[i] === maxScore);

  const winnerText = winners.length === 1
    ? `Winner: <span style="color: ${winners[0].color}; font-weight: 900; letter-spacing: 0.1em;">${escapeHtml(winners[0].name)}</span>`
    : `Tie between: ${winners.map(w => `<span style="color: ${w.color}; font-weight: 900; letter-spacing: 0.1em;">${escapeHtml(w.name)}</span>`).join(', ')}`;

  banner.innerHTML = `
    <h2 class="winner-title">GAME OVER</h2>
    <div style="font-size: 22px; color: #fff;">${winnerText}</div>
    <div class="winner-grid">
      ${teams.map((t, i) => {
        const sign = scores[i] < 0 ? '-' : '';
        return `<div class="winner-card" style="border: 2px solid ${t.color};">
          <div style="color: ${t.color}; font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700;">${escapeHtml(t.name)}</div>
          <div style="font-family: 'Bodoni MT', 'Didot', Georgia, serif; font-size: 32px; font-weight: 900; color: #FFD700; margin-top: 4px;">${sign}$${Math.abs(scores[i])}</div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn btn-primary" onclick="resetGame()">Play Again</button>
  `;
  banner.classList.add('open');
}

// ============ INIT ============
document.getElementById('reset-btn').addEventListener('click', resetGame);
document.getElementById('rename-btn').addEventListener('click', toggleEditTeams);
document.getElementById('modal-backdrop').addEventListener('click', closeCell);

renderBoard();
renderTeamBar();
</script>
</body>
</html>

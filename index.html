<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EECS Jeopardy — APCSA Review</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #0a1a5c 0%, #050928 60%, #020514 100%);
    font-family: Georgia, 'Times New Roman', serif;
    color: #fff;
    padding: 24px 16px 48px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 40% 80%, rgba(255,215,0,0.3), transparent),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.4), transparent);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 24px; }
  h1 {
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-size: clamp(36px, 7vw, 72px);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: #FFD700;
    text-shadow: 0 4px 0 #000, 0 8px 24px rgba(255,215,0,0.4);
    margin: 0;
    line-height: 1;
  }
  .subtitle {
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.3em;
    color: #9bb3ff;
    margin-top: 8px;
    text-transform: uppercase;
  }
  .top-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 16px 0 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .cleared-box {
    background: linear-gradient(180deg, #1a2a8a, #0a1450);
    border: 2px solid #FFD700;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 14px;
    font-weight: 700;
  }
  .cleared-label {
    font-size: 10px;
    color: #9bb3ff;
    letter-spacing: 0.2em;
    display: block;
    text-transform: uppercase;
  }
  .cleared-value { color: #FFD700; font-family: 'Bodoni MT', 'Didot', Georgia, serif; }
  .plain-btn {
    background: transparent;
    color: #9bb3ff;
    border: 1px solid #3a4a8a;
    padding: 8px 16px;
    border-radius: 4px;

  .plain-btn:hover { background: rgba(155,179,255,0.1); }
  .board {
    display: grid;
    grid-template-columns: repeat(6, 1fr);

    background: #000;

  .cat-cell {
    background: linear-gradient(180deg, #1e3adf 0%, #0a1a8a 100%);
    padding: 18px 8px;
    text-align: center;
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-weight: 900;

    letter-spacing: 0.05em;
    text-transform: uppercase;

  }
  .val-cell {
    background: linear-gradient(180deg, #1e3adf 0%, #0a1a8a 100%);
    padding: 24px 8px;
    text-align: center;
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-weight: 900;
    font-size: clamp(18px, 2.2vw, 32px);
    color: #FFD700;

    align-items: center;
    justify-content: center;

  .val-cell:hover { filter: brightness(1.2); }

  .team-name {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;

    display: flex;
    align-items: center;

  .team-name input {

  .team-picker {

  .team-picker-label {

    display: grid;

  .reveal-box {

    margin-bottom: 16px;

  .explanation {
    background: rgba(0,0,0,0.3);

    line-height: 1.6;
    color: #d8e0ff;

  .actions { display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary { background: #FFD700; color: #000; }
  .btn-ghost { background: transparent; color: #9bb3ff; border: 1px solid #3a4a8a; }

  .team-award-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  .team-award-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #9bb3ff;
    text-align: center;
    text-transform: uppercase;
  }
  .team-award-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .award-btn {
    color: #000;
    border: none;
    padding: 12px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .award-btn .amt { font-size: 14px; margin-top: 2px; display: block; }
  .penalty-btn {
    background: rgba(239,68,68,0.15);
    color: #fff;
    padding: 8px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  .penalty-btn .amt { font-size: 12px; color: #ef4444; font-weight: 700; display: block; }
  /* Winner */
  .winner-banner {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    flex-direction: column;
    gap: 20px;
    padding: 24px;
    text-align: center;
  }
  .winner-title {
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-size: clamp(40px, 8vw, 80px);
    color: #FFD700;
    text-shadow: 0 4px 0 #000, 0 8px 24px rgba(255,215,0,0.6);
    margin: 0;
    letter-spacing: 0.1em;
  }
  .winner-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 600px;
    width: 100%;
  }
  .winner-card {
    border-radius: 6px;
    padding: 16px;
    background: rgba(0,0,0,0.4);
  }
  .winner-card .name {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .winner-card .score {
    font-family: 'Bodoni MT', 'Didot', Georgia, serif;
    font-size: 32px;
    font-weight: 900;
    color: #FFD700;
    margin-top: 4px;
  }
  .hidden { display: none !important; }
</style>

<body>
  <div class="container">
    <header>
      <h1>EECS JEOPARDY</h1>
      <div class="subtitle">APCSA Review · Niral, Tanu, Shreya, Rachael, Dyuti</div>
    </header>

    <div class="top-bar">
      <div class="cleared-box">
        <span class="cleared-label">Cleared</span>
        <span class="cleared-value"><span id="answered-count">0</span>/30</span>
      </div>
      <button class="plain-btn" id="rename-btn">Rename Teams</button>
      <button class="plain-btn" id="reset-btn">Reset Game</button>
    </div>

    <div class="board" id="board"></div>

    <div class="hint">Click a dollar value to reveal the clue</div>

    <div class="scoreboard" id="scoreboard"></div>
  </div>

  <div class="modal-backdrop hidden" id="modal-backdrop">
    <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
  </div>

  <div class="winner-banner hidden" id="winner-banner"></div>

<script>
// ============ GAME DATA ============
const CATEGORIES = [
  "Objects & Methods",
  "Selection & Iteration",
  "Class Creation",
  "Arrays & ArrayLists",
  "Recursion",
  "Miscellaneous",
];

const VALUES = [200, 400, 600, 800, 1000];

const BOARD = {
  "Objects & Methods": [
    {
      question: "Which statement BEST describes how objects are passed into methods in Java?",
      code: null,
      choices: [
        "A. Objects are passed by reference",
        "B. Objects are passed by value of their reference",
        "C. Objects are passed by value of their data",
        "D. Objects are passed by copy of the object",
      ],
      answer: "B",
      explanation: "Java is strictly pass-by-value. For objects, the VALUE that gets copied is the reference itself — so the method receives a copy of the reference pointing to the same object.",
    },
    {
      question: "What is printed?",
      code: `public class Dog {
  private String name;
  public Dog(String n) { name = n; }
  public void setName(String n) { n = name; }
  public String getName() { return name; }
}

Dog d = new Dog("Max");
d.setName("Buddy");
System.out.println(d.getName());`,
      choices: ["A. Max", "B. Buddy", "C. null", "D. Compilation error"],
      answer: "A",
      explanation: "Inside setName, the line `n = name;` assigns the field's value to the local parameter. The field `name` is never modified, so it stays \"Max\".",
    },
    {
      question: "What is printed?",
      code: `public class Counter {
  private int count;
  public Counter() { count = 0; }
  public void increment(int count) { count++; }
  public int getCount() { return count; }
}

Counter c = new Counter();
c.increment(5);
System.out.println(c.getCount());`,
      choices: ["A. 0", "B. 1", "C. 5", "D. 6"],
      answer: "A",
      explanation: "The parameter `count` shadows the instance field. `count++` increments the local parameter, not the field. The field stays at 0.",
    },
    {
      question: "What is printed?",
      code: `public class Box {
  private int value;
  public Box(int v) { value = v; }
  public void change(Box b) {
    b.value = 20;
    b = new Box(50);
  }
  public int getValue() { return value; }
}

Box b1 = new Box(10);
b1.change(b1);
System.out.println(b1.getValue());`,
      choices: ["A. 10", "B. 20", "C. 50", "D. Compilation error"],
      answer: "B",
      explanation: "`b.value = 20` mutates the actual object b1 points to. Then `b = new Box(50)` only reassigns the LOCAL copy of the reference — b1 is unaffected. Result: 20.",
    },
    {
      question: "What is printed?",
      code: `public class A {
  public int num;
  public A(int n) { num = n; }
  public void mystery(A other) {
    other.num = num + other.num;
    num = num * 2;
  }
}

A obj1 = new A(3);
A obj2 = new A(4);
obj1.mystery(obj2);
System.out.println(obj1.num + " " + obj2.num);`,
      choices: ["A. 3 7", "B. 6 7", "C. 6 10", "D. 3 10"],
      answer: "B",
      explanation: "other.num = 3 + 4 = 7 (obj2.num becomes 7). Then num = 3 * 2 = 6 (obj1.num becomes 6). Output: \"6 7\".",
    },
    {
      question: "What is printed?",
      code: `public class Wrapper {
  private int value;
  public Wrapper(int v) { value = v; }
  public void update(Wrapper w) {
    w.value += value;
    value += 5;
  }
  public int getValue() { return value; }
}

Wrapper a = new Wrapper(2);
Wrapper b = new Wrapper(3);
a.update(b);
b.update(a);
System.out.println(a.getValue() + " " + b.getValue());`,
      choices: ["A. 7 5", "B. 10 7", "C. 12 10", "D. 7 10"],
      answer: "C",
      explanation: "a.update(b): b.value = 3+2 = 5, a.value = 2+5 = 7. Now a=7, b=5. b.update(a): a.value = 7+5 = 12, b.value = 5+5 = 10. Output: \"12 10\".",
    },
  ],
  "Selection & Iteration": [
    {
      question: "What is the output of this code?",
      code: `int x = 3;
int y = 5;
int sum = 0;
for (int i = 0; i < 4; i++) {
  x += i;
  for (int j = 2; j >= 0; j--) {
    if ((x + j) % 2 == 0) {
      sum += x - j;
    } else if ((y + i) % 3 == 0) {
      sum += y + j;
      y--;
    } else {
      sum += i + j;
    }
    x--;
  }
  y += i;
}
System.out.println(sum);`,
      choices: null,
      answer: "1",
      explanation: "Trace carefully — this one requires tracking x, y, and sum through all iterations. Final sum = 1.",
    },
    {
      question: "What is the output of the code?",
      code: `int a = 7;
int b = 2;
int count = 0;
while (a > 0) {
  if (a % 2 == 1) {
    for (int i = 0; i < b; i++) {
      count += i;
      if (count % 2 == 0) {
        a -= 2;
      } else {
        a--;
      }
    }
  } else {
    a /= 2;
    b++;
  }
  count++;
}
System.out.println(count);`,
      choices: null,
      answer: "11",
      explanation: "Final count = 11 after tracing through all the branches.",
    },
    {
      question: "What is the output of the code?",
      code: `int n = 6;
int total = 1;
for (int i = 1; i <= n; i++) {
  int temp = i;
  while (temp > 0) {
    if (temp % 2 == 0) {
      total += temp / 2;
      temp -= 3;
    } else {
      total += temp;
      temp -= 2;
    }
  }
  if (total % 5 == 0) {
    total /= 5;
  } else {
    total += i;
  }
}
System.out.println(total);`,
      choices: null,
      answer: "15",
      explanation: "Final total = 15.",
    },
    {
      question: "What is the output of the code?",
      code: `int result = 0;
for (int i = 1; i <= 3; i++) {
  int val = i * 2;
  for (int j = 0; j < 3; j++) {
    int temp = val;
    if (j % 2 == 0) {
      temp += j;
    } else {
      temp -= i;
    }
    for (int k = 1; k <= 2; k++) {
      if ((temp + k) % 3 == 0) {
        result += temp * k;
      } else {
        result -= k;
      }
    }
  }
}
System.out.println(result);`,
      choices: null,
      answer: "12",
      explanation: "Triple nested loop trace — final result = 12.",
    },
    {
      question: "What is the output of the code?",
      code: `int x = 4;
int y = 3;
int z = 0;
for (int i = 0; i < 5; i++) {
  boolean flag = (i % 2 == 0);
  if (flag && x > y || !flag && y > x) {
    z += x - y;
    x--;
  } else {
    z += y - x;
    y++;
  }
  if ((x + y + z) % 4 == 0) {
    z /= 2;
  } else {
    z += i;
  }
}
System.out.println(z);`,
      choices: null,
      answer: "7",
      explanation: "Remember && binds tighter than ||. Final z = 7.",
    },
    {
      question: "What is the output of the code?",
      code: `int a = 2;
int b = 3;
int c = 1;
for (int i = 0; i < 4; i++) {
  if (a % 2 == 0) {
    b += a;
    for (int j = 0; j < 2; j++) {
      if ((b + j) % 3 == 0) {
        c += b - j;
      } else {
        c += a + j;
      }
    }
    a++;
  } else {
    c += b;
    b--;
  }
  if (c % 2 == 0) {
    a += c % 3;
  } else {
    b += c % 2;
  }
}
System.out.println(a + " " + b + " " + c);`,
      choices: null,
      answer: "3 6 25",
      explanation: "After all 4 iterations: a=3, b=6, c=25.",
    },
  ],
  "Class Creation": [
    {
      question: "What is the purpose of the `this` keyword when used inside a constructor, and when is it necessary?",
      code: null,

const DEFAULT_TEAMS = [
  { name: "Team 1", color: "#ef4444" },
  { name: "Team 2", color: "#22c55e" },
  { name: "Team 3", color: "#3b82f6" },
];

// ============ STATE ============
let teams = JSON.parse(JSON.stringify(DEFAULT_TEAMS));
let scores = [0, 0, 0];
let answered = {};
let active = null;
let selectedChoice = null;
let revealed = false;
let activeTeam = null;
let editingTeams = false;

// ============ HELPERS ============
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function answeredCount() {
  return Object.keys(answered).length;
}

function isGameComplete() {
  return answeredCount() === CATEGORIES.length * VALUES.length;
}

// ============ RENDER BOARD ============
function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  // category row
  CATEGORIES.forEach((cat) => {
    const el = document.createElement("div");
    el.className = "cat-cell";
    el.textContent = cat;
    board.appendChild(el);
  });
  // value rows
  VALUES.forEach((val, valueIdx) => {
    CATEGORIES.forEach((cat) => {
      const key = cat + "-" + valueIdx;
      const el = document.createElement("div");
      el.className = "val-cell" + (answered[key] ? " answered" : "");
      el.textContent = answered[key] ? "" : "$" + val;
      if (!answered[key]) {
        el.addEventListener("click", () => openCell(cat, valueIdx));
      }
      board.appendChild(el);
    });
  });
  document.getElementById("answered-count").textContent = answeredCount();
}

// ============ RENDER SCOREBOARD ============
function renderScoreboard() {
  const sb = document.getElementById("scoreboard");
  sb.innerHTML = "";
  const maxScore = Math.max.apply(null, scores);
  const allEqual = scores[0] === scores[1] && scores[1] === scores[2];
  teams.forEach((team, idx) => {
    const isLeader = scores[idx] === maxScore && !allEqual;
    const div = document.createElement("div");
    div.className = "team" + (isLeader ? " leader" : "");
    div.style.borderLeft = "2px solid " + team.color;
    const nameHtml = editingTeams
      ? `<input value="${escapeHtml(team.name)}" data-team-idx="${idx}" maxlength="20" style="border:1px solid ${team.color}66" />`
      : `<span style="color:${team.color}">${escapeHtml(team.name)}</span>${isLeader ? '<span class="leader-star">★</span>' : ''}`;
    const sign = scores[idx] < 0 ? "-" : "";
    div.innerHTML = `
      <div class="team-name">${nameHtml}</div>
      <div class="team-row">
        <div class="team-score">${sign}$${Math.abs(scores[idx])}</div>
        <div style="display:flex;gap:3px">
          <button class="tiny-btn minus-btn" data-idx="${idx}" style="border:1px solid ${team.color}44">−</button>
          <button class="tiny-btn plus-btn" data-idx="${idx}" style="border:1px solid ${team.color}44">+</button>
        </div>
      </div>
    `;
    sb.appendChild(div);
  });
  // attach listeners
  sb.querySelectorAll(".minus-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      scores[parseInt(btn.dataset.idx)] -= 100;
      renderScoreboard();
    });
  });
  sb.querySelectorAll(".plus-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      scores[parseInt(btn.dataset.idx)] += 100;
      renderScoreboard();
    });
  });
  sb.querySelectorAll("input[data-team-idx]").forEach((input) => {
    input.addEventListener("input", (e) => {
      teams[parseInt(e.target.dataset.teamIdx)].name = e.target.value;
    });
  });
}

// ============ MODAL ============
function openCell(category, valueIdx) {
  const key = category + "-" + valueIdx;
  if (answered[key]) return;
  active = { category, valueIdx, cell: BOARD[category][valueIdx] };
  selectedChoice = null;
  revealed = false;
  activeTeam = null;
  renderModal();
  document.getElementById("modal-backdrop").classList.remove("hidden");
}

function closeCell() {
  active = null;
  selectedChoice = null;
  revealed = false;
  activeTeam = null;
  document.getElementById("modal-backdrop").classList.add("hidden");
  checkGameComplete();
}

function skipQuestion() {
  const key = active.category + "-" + active.valueIdx;
  answered[key] = true;
  closeCell();
  renderBoard();
}

function submitMC() {
  if (!selectedChoice || activeTeam === null) return;
  const key = active.category + "-" + active.valueIdx;
  const value = VALUES[active.valueIdx];
  const correct = selectedChoice === active.cell.answer;
  scores[activeTeam] += correct ? value : -value;
  revealed = true;
  answered[key] = true;
  renderModal();
  renderScoreboard();
  renderBoard();
}

function markCorrect(teamIdx) {
  const key = active.category + "-" + active.valueIdx;
  scores[teamIdx] += VALUES[active.valueIdx];
  answered[key] = true;
  closeCell();
  renderBoard();
  renderScoreboard();
}

function markIncorrect(teamIdx) {
  const key = active.category + "-" + active.valueIdx;
  scores[teamIdx] -= VALUES[active.valueIdx];
  answered[key] = true;
  closeCell();
  renderBoard();
  renderScoreboard();
}

function renderModal() {
  const modal = document.getElementById("modal");
  const { category, valueIdx, cell } = active;
  const isMC = cell.choices !== null;

  let html = `
    <div class="modal-header">
      <div class="modal-cat">${escapeHtml(category)}</div>
      <div class="modal-val">$${VALUES[valueIdx]}</div>
    </div>
    <div class="question-text">${escapeHtml(cell.question)}</div>
  `;

  if (cell.code) {
    html += `<pre class="code">${escapeHtml(cell.code)}</pre>`;
  }

  // team picker (before reveal)
  if (!revealed) {
    html += `
      <div class="team-picker">
        <div class="team-picker-label">${isMC ? "Which team is answering?" : "Who buzzed in first?"}</div>
        <div class="team-picker-grid">
          ${teams.map((team, idx) => {
            const selected = activeTeam === idx;
            return `<button class="team-pick-btn pick-team-btn" data-idx="${idx}"
              style="background:${selected ? team.color : 'rgba(0,0,0,0.3)'};
                     color:${selected ? '#000' : '#fff'};
                     border:2px solid ${team.color}">
              ${escapeHtml(team.name)}
            </button>`;
          }).join("")}
        </div>
      </div>
    `;
  }

  // choices
  if (isMC) {
    html += `<div class="choices">`;
    cell.choices.forEach((choice) => {
      const letter = choice.trim().charAt(0);
      let state = "";
      if (revealed) {
        if (letter === cell.answer) state = "correct";
        else if (letter === selectedChoice) state = "incorrect";
      } else if (selectedChoice === letter) {
        state = "selected";
      }
      html += `<button class="choice ${state} choice-btn" data-letter="${letter}" ${revealed ? 'disabled' : ''}>${escapeHtml(choice)}</button>`;
    });
    html += `</div>`;
  }

  // free-response reveal
  if (!isMC && revealed) {
    html += `
      <div class="reveal-box">
        <div class="reveal-label">ANSWER</div>
        <div class="reveal-answer">${escapeHtml(cell.answer)}</div>
      </div>
    `;
  }

  // explanation
  if (revealed) {
    html += `<div class="explanation">${escapeHtml(cell.explanation)}</div>`;
  }

  // actions
  html += `<div class="actions">`;
  if (!revealed && isMC) {
    const canSubmit = selectedChoice && activeTeam !== null;
    const label = activeTeam === null ? "Pick a team first" : !selectedChoice ? "Pick an answer" : `Submit for ${teams[activeTeam].name}`;
    html += `
      <button class="btn btn-ghost" id="skip-btn">Skip (no points)</button>
      <button class="btn btn-primary" id="submit-btn" ${canSubmit ? '' : 'disabled'}>${escapeHtml(label)}</button>
    `;
  } else if (!revealed && !isMC) {
    html += `
      <button class="btn btn-ghost" id="skip-btn">Skip (no points)</button>
      <button class="btn btn-primary" id="reveal-btn">Reveal Answer</button>
    `;
  } else if (revealed && !isMC) {
    html += `<div class="team-award-grid">
      <div class="team-award-label">Who gets the points?</div>
      <div class="team-award-row">
        ${teams.map((team, idx) => `
          <button class="award-btn award-correct" data-idx="${idx}" style="background:${team.color}">
            ${escapeHtml(team.name)}<span class="amt">+$${VALUES[valueIdx]}</span>
          </button>
        `).join("")}
      </div>
      <div class="team-award-row">
        ${teams.map((team, idx) => `
          <button class="penalty-btn award-wrong" data-idx="${idx}" style="border:1px solid ${team.color}">
            ${escapeHtml(team.name)} wrong<span class="amt">−$${VALUES[valueIdx]}</span>
          </button>
        `).join("")}
      </div>
      <button class="btn btn-ghost" id="close-btn" style="align-self:center;margin-top:4px">Close (no score change)</button>
    </div>`;
  } else if (revealed && isMC) {
    html += `<button class="btn btn-primary" id="continue-btn">Continue</button>`;
  }
  html += `</div>`;

  modal.innerHTML = html;

  // ====== attach listeners ======
  modal.querySelectorAll(".pick-team-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      activeTeam = parseInt(btn.dataset.idx);
      renderModal();
    });
  });
  modal.querySelectorAll(".choice-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      if (revealed) return;
      selectedChoice = btn.dataset.letter;
      renderModal();
    });
  });
  const skipBtn = document.getElementById("skip-btn");
  if (skipBtn) skipBtn.addEventListener("click", skipQuestion);
  const submitBtn = document.getElementById("submit-btn");
  if (submitBtn) submitBtn.addEventListener("click", submitMC);
  const revealBtn = document.getElementById("reveal-btn");
  if (revealBtn) revealBtn.addEventListener("click", () => { revealed = true; renderModal(); });
  const continueBtn = document.getElementById("continue-btn");
  if (continueBtn) continueBtn.addEventListener("click", closeCell);
  const closeBtn = document.getElementById("close-btn");
  if (closeBtn) closeBtn.addEventListener("click", closeCell);
  modal.querySelectorAll(".award-correct").forEach((btn) => {
    btn.addEventListener("click", () => markCorrect(parseInt(btn.dataset.idx)));
  });
  modal.querySelectorAll(".award-wrong").forEach((btn) => {
    btn.addEventListener("click", () => markIncorrect(parseInt(btn.dataset.idx)));
  });
}

// ============ GAME OVER ============
function checkGameComplete() {
  if (!isGameComplete()) {
    document.getElementById("winner-banner").classList.add("hidden");
    return;
  }
  const maxScore = Math.max.apply(null, scores);
  const winners = teams.filter((_, i) => scores[i] === maxScore);
  const winnerText = winners.length === 1
    ? `Winner: <span style="color:${winners[0].color};font-weight:900;letter-spacing:0.1em">${escapeHtml(winners[0].name)}</span>`
    : `Tie between: ${winners.map((w) => `<span style="color:${w.color};font-weight:900;letter-spacing:0.1em">${escapeHtml(w.name)}</span>`).join(", ")}`;

  const banner = document.getElementById("winner-banner");
  banner.innerHTML = `
    <h2 class="winner-title">GAME OVER</h2>
    <div style="font-size:22px;color:#fff">${winnerText}</div>
    <div class="winner-grid">
      ${teams.map((team, idx) => {
        const sign = scores[idx] < 0 ? "-" : "";
        return `<div class="winner-card" style="border:2px solid ${team.color}">
          <div class="name" style="color:${team.color}">${escapeHtml(team.name)}</div>
          <div class="score">${sign}$${Math.abs(scores[idx])}</div>
        </div>`;
      }).join("")}
    </div>
    <button class="btn btn-primary" id="play-again-btn">Play Again</button>
  `;
  banner.classList.remove("hidden");
  document.getElementById("play-again-btn").addEventListener("click", resetGame);
}

// ============ RESET ============
function resetGame() {
  const anyProgress = Object.keys(answered).length > 0 || scores.some((s) => s !== 0);
  if (anyProgress && !confirm("Reset the entire game?")) return;
  scores = [0, 0, 0];
  answered = {};
  active = null;
  document.getElementById("modal-backdrop").classList.add("hidden");
  document.getElementById("winner-banner").classList.add("hidden");
  renderBoard();
  renderScoreboard();
}

// ============ INIT ============
document.getElementById("reset-btn").addEventListener("click", resetGame);
document.getElementById("rename-btn").addEventListener("click", () => {
  editingTeams = !editingTeams;
  document.getElementById("rename-btn").textContent = editingTeams ? "Done" : "Rename Teams";
  renderScoreboard();
});
document.getElementById("modal-backdrop").addEventListener("click", (e) => {
  if (e.target.id === "modal-backdrop") closeCell();
});

renderBoard();
renderScoreboard();
</script>

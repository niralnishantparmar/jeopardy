<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APCSA Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #29457f;
    --bg: #335291;
    --surface: #3f60a8;
    --surface-2: #4d72c0;
    --border: #5e83d2;
    --border-bright: #82a0e8;
    --text: #f4f6ff;
    --text-dim: #c8d2ed;
    --text-faint: #92a0cc;
    --accent: #ffcb47;
    --accent-bright: #ffd96b;
    --green: #4ade80;
    --red: #ff5e5e;
    --pink: #ff5e9f;
    --cyan: #38d9d9;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    padding: 32px 22px 56px;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 400px at 100% 0%, rgba(255, 203, 71, 0.06), transparent 60%),
      radial-gradient(ellipse 600px 400px at 0% 100%, rgba(56, 217, 217, 0.05), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 1240px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 2px solid var(--border);
    gap: 18px;
    text-align: center;
  }
  .title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(44px, 7vw, 76px);
    line-height: 0.9;
    letter-spacing: -0.04em;
    margin: 0;
    color: var(--text);
    text-transform: uppercase;
  }
  .title .accent {
    color: var(--accent);
  }
  .title .paren {
    color: var(--accent);
    font-weight: 900;
  }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 10px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat strong {
    color: var(--accent);
    font-weight: 900;
    margin-left: 6px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0;
  }
  .icon-btn {
    background: var(--surface);
    color: var(--text);
    border: 2px solid var(--border);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.12s ease;
  }
  .icon-btn:hover {
    background: var(--surface-2);
    border-color: var(--border-bright);
    transform: translateY(-1px);
  }
  .icon-btn.danger:hover {
    color: var(--red);
    border-color: var(--red);
  }

  /* ===== BOARD ===== */
  .board {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .category-cell {
    background: var(--text);
    color: var(--bg-deep);
    padding: 22px 12px;
    text-align: center;
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(14px, 1.5vw, 19px);
    min-height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    line-height: 1.15;
    text-transform: uppercase;
    letter-spacing: 0.01em;
  }
  .value-cell {
    background: var(--surface);
    border: 2px solid var(--border);
    padding: 24px 12px;
    text-align: center;
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(24px, 2.6vw, 36px);
    color: var(--accent);
    min-height: 92px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s ease;
    user-select: none;
    border-radius: 6px;
    letter-spacing: -0.02em;
    position: relative;
  }
  .value-cell:hover {
    background: var(--accent);
    color: var(--bg-deep);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 0 rgba(255, 203, 71, 0.2);
  }
  .value-cell.answered {
    background: transparent;
    color: var(--text-faint);
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: default;
    border-color: var(--border);
    border-style: dashed;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .value-cell.answered:hover {
    transform: none;
    background: transparent;
    color: var(--text-faint);
    border-color: var(--border);
    box-shadow: none;
  }

  .hint {
    text-align: center;
    margin-top: 22px;
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }

  /* ===== TEAM BAR ===== */
  .team-bar {
    margin-top: 32px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .team-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    position: relative;
    transition: all 0.15s ease;
  }
  .team-card.leader {
    border-color: var(--team-color);
    box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04), 0 8px 24px rgba(0, 0, 0, 0.3);
  }
  .team-name {
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    color: var(--team-color);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .leader-badge {
    background: var(--team-color);
    color: var(--bg-deep);
    font-family: 'Archivo', sans-serif;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.1em;
    font-weight: 900;
  }
  .team-name-input {
    background: var(--bg-deep);
    color: var(--text);
    border: 2px solid var(--team-color);
    padding: 5px 10px;
    border-radius: 4px;
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .team-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }
  .team-score {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 38px;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .team-score.negative { color: var(--red); }
  .team-score .sign {
    color: var(--text-faint);
    font-size: 24px;
  }
  .team-adjust {
    display: flex;
    gap: 4px;
  }
  .team-adjust button {
    background: var(--bg-deep);
    color: var(--text-dim);
    border: 2px solid var(--border);
    width: 30px;
    height: 30px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    line-height: 1;
    padding: 0;
    transition: all 0.12s ease;
    font-weight: 700;
  }
  .team-adjust button:hover {
    background: var(--team-color);
    color: var(--bg-deep);
    border-color: var(--team-color);
  }

  /* ===== MODAL ===== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(41, 69, 127, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .modal-backdrop.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .modal {
    background: var(--bg);
    border: 2px solid var(--accent);
    border-radius: 10px;
    padding: 0;
    max-width: 880px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: slideUp 0.22s cubic-bezier(0.2, 0.9, 0.3, 1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 2px solid var(--border);
    gap: 20px;
  }
  .modal-category {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 16px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .modal-value {
    font-family: 'Archivo', sans-serif;
    font-size: 38px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .modal-body {
    padding: 28px 32px 32px;
  }
  .question-text {
    font-family: 'Inter', sans-serif;
    font-size: clamp(18px, 1.65vw, 21px);
    line-height: 1.5;
    color: var(--text);
    margin: 0 0 22px;
    font-weight: 500;
  }
  .code-block {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.65;
    color: #e8edff;
    white-space: pre;
    overflow-x: auto;
    margin-bottom: 24px;
    font-feature-settings: "calt" 0, "liga" 0;
  }
  .reveal-box {
    background: var(--accent);
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .reveal-label {
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    color: var(--bg-deep);
    margin-bottom: 8px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .reveal-answer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    color: var(--bg-deep);
    font-weight: 600;
    white-space: pre-wrap;
    line-height: 1.5;
    word-break: break-word;
  }
  .explanation {
    background: rgba(0, 0, 0, 0.25);
    border-left: 4px solid var(--cyan);
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
  }
  .actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .btn {
    padding: 12px 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
    transition: all 0.12s ease;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .btn:hover {
    background: var(--surface-2);
    border-color: var(--border-bright);
    transform: translateY(-1px);
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg-deep);
    border-color: var(--accent);
    font-weight: 900;
  }
  .btn-primary:hover {
    background: var(--accent-bright);
    border-color: var(--accent-bright);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
  }

  .scoring-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }
  .scoring-label {
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .scoring-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
  }
  .score-award-btn {
    background: var(--surface);
    color: var(--text);
    border: 2px solid var(--btn-color);
    padding: 14px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    font-weight: 800;
    transition: all 0.12s ease;
    text-align: center;
    line-height: 1.3;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .score-award-btn:hover {
    background: var(--btn-color);
    color: var(--bg-deep);
    transform: translateY(-1px);
  }
  .score-award-btn .delta {
    display: block;
    font-size: 13px;
    margin-top: 4px;
    color: var(--green);
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    text-transform: none;
    letter-spacing: 0;
  }
  .score-award-btn:hover .delta { color: var(--bg-deep); }
  .score-wrong-btn {
    background: transparent;
    color: var(--text-dim);
    border: 2px dashed var(--btn-color);
    padding: 10px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    transition: all 0.12s ease;
    line-height: 1.3;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 700;
  }
  .score-wrong-btn:hover {
    background: rgba(255, 94, 94, 0.12);
    color: var(--text);
    border-style: solid;
    border-color: var(--red);
  }
  .score-wrong-btn .delta {
    display: block;
    font-size: 12px;
    margin-top: 3px;
    color: var(--red);
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    text-transform: none;
    letter-spacing: 0;
  }

  /* ===== WINNER ===== */
  .winner-banner {
    position: fixed;
    inset: 0;
    background: rgba(41, 69, 127, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    flex-direction: column;
    gap: 20px;
    padding: 32px;
    text-align: center;
  }
  .winner-banner.open {
    display: flex;
    animation: fadeIn 0.4s ease;
  }
  .winner-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(56px, 10vw, 96px);
    color: var(--accent);
    margin: 0;
    line-height: 0.9;
    letter-spacing: -0.05em;
    text-transform: uppercase;
  }
  .winner-name {
    font-family: 'Archivo', sans-serif;
    font-size: 22px;
    color: var(--text);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .winner-name strong {
    color: var(--accent);
    font-weight: 900;
  }
  .winner-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 640px;
    width: 100%;
    margin-top: 8px;
  }
  .winner-card {
    background: var(--surface);
    border: 2px solid var(--card-color);
    border-radius: 8px;
    padding: 18px 20px;
    text-align: left;
  }
  .winner-card .wname {
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    color: var(--card-color);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .winner-card .wscore {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 38px;
    color: var(--text);
    letter-spacing: -0.04em;
  }

  @media (max-width: 768px) {
    .team-bar { grid-template-columns: 1fr; }
    .winner-grid { grid-template-columns: 1fr; }
    .modal-body, .modal-header { padding: 18px 22px; }
    .scoring-grid { grid-template-columns: 1fr; }
    .board { gap: 4px; }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="title-block">
        <h1 class="title">APCSA<span class="accent">.</span>REVIEW<span class="paren">()</span></h1>
        <div class="subtitle">// niral · tanu · shreya · rachael · dyuti</div>
      </div>
      <div class="controls">
        <div class="stat">Cleared <strong><span id="answered-count">0</span>/<span id="total-count">36</span></strong></div>
        <button class="icon-btn" id="rename-btn">Rename</button>
        <button class="icon-btn danger" id="reset-btn">Reset</button>
      </div>
    </header>

    <div class="board" id="board"></div>

    <div class="hint">Click a value to open</div>

    <div class="team-bar" id="team-bar"></div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
  </div>

  <div class="winner-banner" id="winner-banner"></div>

<script>
// ============ GAME DATA ============
const CATEGORIES = [
  "Objects & Methods",
  "Selection & Iteration",
  "Class Creation",
  "Arrays & ArrayLists",
  "Recursion",
  "Miscellaneous",
];

const VALUES = [100, 200, 300, 400, 500, 600];

// Every output answer below was VERIFIED by compiling and running the Java code.
const BOARD = {
  "Objects & Methods": [
    {
      question: "What is printed?",
      code: `public class A {
  public static int f(int x) {
    return x + 2;
  }
  public static void main(String[] args) {
    System.out.println(f(3));
  }
}`,
      answer: "5",
      explanation: "f(3) returns 3 + 2 = 5. Static methods can be called from main without creating an object.",
    },
    {
      question: "What is printed?",
      code: `public class A {
  public int x = 5;
  public static void main(String[] args) {
    A obj = new A();
    System.out.println(obj.x);
  }
}`,
      answer: "5",
      explanation: "The field x is initialized to 5 when the object is created. Accessing obj.x reads that value directly.",
    },
    {
      question: "What is printed?",
      code: `public class A {
  public int x = 3;
  public int getX() {
    return x + 1;
  }
  public static void main(String[] args) {
    A obj = new A();
    System.out.println(obj.getX());
  }
}`,
      answer: "4",
      explanation: "obj.getX() returns x + 1 = 3 + 1 = 4. The field x itself is not modified (we just read it).",
    },
    {
      question: "What is printed?",
      code: `public class A {
  public int x = 2;
  public void change() {
    x = x + 3;
  }
  public static void main(String[] args) {
    A obj = new A();
    obj.change();
    System.out.println(obj.x);
  }
}`,
      answer: "5",
      explanation: "obj.change() mutates the field x: x = 2 + 3 = 5. After the call, obj.x is 5.",
    },
    {
      question: "What is printed?",
      code: `public class A {
  public int x = 1;
  public void add(A other) {
    other.x += 2;
    this.x += other.x;
  }
  public static void main(String[] args) {
    A a = new A();
    A b = new A();
    b.x = 3;
    a.add(b);
    b.add(a);
    System.out.println(a.x + " " + b.x);
  }
}`,
      answer: "8 13",
      explanation: "Initial: a.x=1, b.x=3.\na.add(b): other.x += 2 makes b.x = 5. this.x += other.x makes a.x = 1+5 = 6.\nState: a.x=6, b.x=5.\nb.add(a): other.x += 2 makes a.x = 8. this.x += other.x makes b.x = 5+8 = 13.\nFinal: a.x=8, b.x=13.",
    },
    {
      question: "What is printed?",
      code: `public class A {
  public int x = 2;
  public A(int x) {
    this.x = x + this.x;
  }
  public void mix(A other) {
    other.x += this.x;
    this.x = other.x - this.x;
  }
  public static void main(String[] args) {
    A a = new A(3);
    A b = new A(5);
    a.mix(b);
    b.mix(a);
    System.out.println(a.x + " " + b.x);
  }
}`,
      answer: "19 7",

const DEFAULT_TEAMS = [
  { name: "Team 1", color: "#ff5e5e" },
  { name: "Team 2", color: "#4ade80" },
  { name: "Team 3", color: "#38d9d9" },
];

// ============ STATE ============
let teams = DEFAULT_TEAMS.map(t => ({...t}));
let scores = [0, 0, 0];
let answered = {};
let active = null;
let revealed = false;
let editingTeams = false;

const totalCells = CATEGORIES.length * VALUES.length;

// ============ HELPERS ============
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}
function answeredCount() { return Object.keys(answered).length; }

// ============ RENDER BOARD ============
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'category-cell';
    el.textContent = cat;
    board.appendChild(el);
  });

  VALUES.forEach((val, valueIdx) => {
    CATEGORIES.forEach(cat => {
      const key = `${cat}-${valueIdx}`;
      const isAnswered = !!answered[key];
      const el = document.createElement('div');
      el.className = 'value-cell' + (isAnswered ? ' answered' : '');
      el.textContent = isAnswered ? 'Done' : `$${val}`;
      if (!isAnswered) {
        el.addEventListener('click', () => openCell(cat, valueIdx));
      }
      board.appendChild(el);
    });
  });

  document.getElementById('answered-count').textContent = answeredCount();
  document.getElementById('total-count').textContent = totalCells;
}

// ============ RENDER TEAM BAR ============
function renderTeamBar() {
  const bar = document.getElementById('team-bar');
  bar.innerHTML = '';

  const maxScore = Math.max(...scores);
  const allEqual = scores.every(s => s === scores[0]);

  teams.forEach((team, idx) => {
    const isLeader = scores[idx] === maxScore && !allEqual;
    const card = document.createElement('div');
    card.className = 'team-card' + (isLeader ? ' leader' : '');
    card.style.setProperty('--team-color', team.color);

    let nameHtml;
    if (editingTeams) {
      nameHtml = `<input class="team-name-input" value="${escapeHtml(team.name)}" maxlength="20" oninput="updateTeamName(${idx}, this.value)" />`;
    } else {
      nameHtml = `<div class="team-name">
        <span>${escapeHtml(team.name)}</span>
        ${isLeader ? '<span class="leader-badge">LEAD</span>' : ''}
      </div>`;
    }

    const isNeg = scores[idx] < 0;
    const sign = isNeg ? '-' : '';
    const absScore = Math.abs(scores[idx]);

    card.innerHTML = `
      ${nameHtml}
      <div class="team-row">
        <div class="team-score${isNeg ? ' negative' : ''}"><span class="sign">${sign}$</span>${absScore}</div>
        <div class="team-adjust">
          <button onclick="updateScore(${idx}, -100)" title="-$100">−</button>
          <button onclick="updateScore(${idx}, 100)" title="+$100">+</button>
        </div>
      </div>
    `;
    bar.appendChild(card);
  });
}

// ============ MODAL ============
function openCell(category, valueIdx) {
  const key = `${category}-${valueIdx}`;
  if (answered[key]) return;
  active = { category, valueIdx, cell: BOARD[category][valueIdx] };
  revealed = false;
  renderModal();
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeCell() {
  active = null;
  revealed = false;
  document.getElementById('modal-backdrop').classList.remove('open');
  checkGameComplete();
}

function renderModal() {
  if (!active) return;
  const modal = document.getElementById('modal');
  const { category, valueIdx, cell } = active;
  const value = VALUES[valueIdx];

  let revealHtml = '';
  if (revealed) {
    revealHtml = `<div class="reveal-box">
      <div class="reveal-label">Answer</div>
      <div class="reveal-answer">${escapeHtml(cell.answer)}</div>
    </div>`;
  }

  let explanationHtml = '';
  if (revealed) {
    explanationHtml = `<div class="explanation">${escapeHtml(cell.explanation)}</div>`;
  }

  let actionsHtml = '';
  if (!revealed) {
    actionsHtml = `
      <button class="btn btn-ghost" onclick="skipQuestion()">Skip</button>
      <button class="btn btn-primary" onclick="revealAnswer()">Reveal Answer</button>
    `;
  } else {
    actionsHtml = `
      <div class="scoring-section">
        <div class="scoring-label">Award $${value} to:</div>
        <div class="scoring-grid">
          ${teams.map((t, i) => `
            <button class="score-award-btn" style="--btn-color: ${t.color};" onclick="markCorrect(${i})">
              ${escapeHtml(t.name)}
              <span class="delta">+$${value}</span>
            </button>
          `).join('')}
        </div>
        <div class="scoring-label" style="margin-top: 4px;">Or deduct $${value} from:</div>
        <div class="scoring-grid">
          ${teams.map((t, i) => `
            <button class="score-wrong-btn" style="--btn-color: ${t.color};" onclick="markIncorrect(${i})">
              ${escapeHtml(t.name)}
              <span class="delta">-$${value}</span>
            </button>
          `).join('')}
        </div>
        <div style="display: flex; justify-content: center; margin-top: 4px;">
          <button class="btn btn-ghost" onclick="closeCell()">Close without scoring</button>
        </div>
      </div>
    `;
  }

  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-category">${escapeHtml(category)}</div>
      <div class="modal-value">$${value}</div>
    </div>
    <div class="modal-body">
      <div class="question-text">${escapeHtml(cell.question)}</div>
      ${cell.code ? `<pre class="code-block">${escapeHtml(cell.code)}</pre>` : ''}
      ${revealHtml}
      ${explanationHtml}
      <div class="actions">${actionsHtml}</div>
    </div>
  `;
}

// ============ ACTIONS ============
function revealAnswer() {
  revealed = true;
  renderModal();
}

function markCorrect(teamIdx) {
  const { category, valueIdx } = active;
  const key = `${category}-${valueIdx}`;
  scores[teamIdx] += VALUES[valueIdx];
  answered[key] = true;
  renderBoard();
  renderTeamBar();
  closeCell();
}

function markIncorrect(teamIdx) {
  const { category, valueIdx } = active;
  const key = `${category}-${valueIdx}`;
  scores[teamIdx] -= VALUES[valueIdx];
  answered[key] = true;
  renderBoard();
  renderTeamBar();
  closeCell();
}

function skipQuestion() {
  const { category, valueIdx } = active;
  const key = `${category}-${valueIdx}`;
  answered[key] = true;
  renderBoard();
  closeCell();
}

function updateScore(idx, delta) {
  scores[idx] += delta;
  renderTeamBar();
}

function updateTeamName(idx, name) {
  teams[idx].name = name;
}

function resetGame() {
  const anyProgress = answeredCount() > 0 || scores.some(s => s !== 0);
  if (anyProgress && !confirm("Reset the entire game?")) return;
  scores = [0, 0, 0];
  answered = {};
  active = null;
  document.getElementById('modal-backdrop').classList.remove('open');
  document.getElementById('winner-banner').classList.remove('open');
  renderBoard();
  renderTeamBar();
}

function toggleEditTeams() {
  editingTeams = !editingTeams;
  document.getElementById('rename-btn').textContent = editingTeams ? 'Done' : 'Rename';
  renderTeamBar();
}

function checkGameComplete() {
  if (answeredCount() === totalCells) {
    showWinner();
  }
}

function showWinner() {
  const banner = document.getElementById('winner-banner');
  const maxScore = Math.max(...scores);
  const winners = teams.filter((_, i) => scores[i] === maxScore);

  const winnerText = winners.length === 1
    ? `Winner: <strong>${escapeHtml(winners[0].name)}</strong>`
    : `Tie: <strong>${winners.map(w => escapeHtml(w.name)).join(' & ')}</strong>`;

  banner.innerHTML = `
    <h2 class="winner-title">Game Over</h2>
    <div class="winner-name">${winnerText}</div>
    <div class="winner-grid">
      ${teams.map((t, i) => {
        const isNeg = scores[i] < 0;
        const sign = isNeg ? '-' : '';
        return `<div class="winner-card" style="--card-color: ${t.color};">
          <div class="wname">${escapeHtml(t.name)}</div>
          <div class="wscore">${sign}$${Math.abs(scores[i])}</div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn btn-primary" onclick="resetGame()">Play Again</button>
  `;
  banner.classList.add('open');
}

// ============ INIT ============
document.getElementById('reset-btn').addEventListener('click', resetGame);
document.getElementById('rename-btn').addEventListener('click', toggleEditTeams);
document.getElementById('modal-backdrop').addEventListener('click', closeCell);

renderBoard();
renderTeamBar();
</script>
